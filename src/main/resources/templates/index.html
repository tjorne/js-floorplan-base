<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Floor Map</title>

    <link rel="stylesheet" href="../public/css/styles.css" />
</head>
<body>
<header class="topbar">
    <h1>Floor Map</h1>

    <div class="controls">
        <div class="control">
            <label>Floor navigation</label>
            <div class="floor-buttons">
                <button id="floorDown" type="button">⬇ Floor</button>
                <button id="floorUp" type="button">⬆ Floor</button>
            </div>
        </div>
        <label class="control">
            Floor
            <select id="floorSelect">
                <option value="0">00</option>
                <option value="1">01</option>
                <option value="2">02</option>
                <option value="3">03</option>
                <option value="4">04</option>
                <option value="5" selected>05</option>
            </select>
        </label>

        <label class="control">
            Room number
            <input id="roomSearch" type="text" placeholder="e.g. 301" autocomplete="off" />
        </label>
    </div>
</header>

<main class="layout">
    <section class="map-panel">
        <div id="map" class="map" aria-label="Floor map">
            <!-- Floors (stacked). JS will activate one. -->
            <img class="floor" data-floor="0" src="../public/images/00_floors.jpg" alt="Floor 00" />
            <img class="floor" data-floor="1" src="../public/images/01_floors.jpg" alt="Floor 01" />
            <img class="floor" data-floor="2" src="../public/images/02_floors.jpg" alt="Floor 02" />
            <img class="floor" data-floor="3" src="../public/images/03_floors.jpg" alt="Floor 03" />
            <img class="floor" data-floor="4" src="../public/images/04_floors.jpg" alt="Floor 04" />
            <img class="floor is-active" data-floor="5" src="../public/images/05_floors.jpg" alt="Floor 05" />

            <!-- Marker overlay (generated by JS) -->
            <div id="markers" class="markers" aria-hidden="true"></div>
        </div>
    </section>

    <aside class="info-panel">
        <h2>Selection</h2>
        <p>
            Selected room:
            <strong id="selectedRoomText">None</strong>
        </p>
        <p class="hint">
            Tip: Click a red dot to open booking modal. Type a room number to jump floors.
        </p>
    </aside>
</main>

<dialog id="roomModal">
    <form method="dialog" class="modal">
        <header class="modal__header">
            <h3 id="modalTitle">Room</h3>
        </header>

        <div class="modal__body">
            <label class="control">
                Date
                <input id="dateInput" type="date" />
            </label>

            <label class="control">
                Time
                <input id="timeInput" type="time" />
            </label>

            <p class="summary">
                Booking summary:
                <span id="summaryText">—</span>
            </p>

            <p id="modalMessage" class="message" aria-live="polite"></p>
        </div>

        <footer class="modal__footer">
            <button value="cancel">Cancel</button>
            <button id="bookBtn" value="confirm">Book</button>
        </footer>
    </form>
</dialog>

<script src="../public/js/app.js"></script>
</body>
</html>
